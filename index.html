    function updateUI() {
        const item = assessmentList[currentIdx];
        document.getElementById('displayText').textContent = item.word;
        document.getElementById('ipaTag').textContent = "IPA: " + item.ipa;
        document.getElementById('counter').textContent = `${currentIdx + 1} / ${assessmentList.length}`;
        document.getElementById('displayImg').src = item.img;
        document.querySelectorAll('.soda-btn').forEach(b => b.classList.remove('selected'));
    }

    async function handleRecording() {
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
                });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.start();
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                document.getElementById('recordBtn').classList.add('recording');
                document.getElementById('recordBtn').textContent = "вПєпЄП STOP RECORDING";
            } catch (e) { alert("Mic Error: " + e.message); }
        } else {
            mediaRecorder.stop();
            document.getElementById('recordBtn').classList.remove('recording');
            document.getElementById('recordBtn').textContent = "рЯОЩпЄП RECORD SAMPLE";
        }
    }
