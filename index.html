<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PGIMER Articulation - Max Visibility</title>
    <style>
        :root { --primary: #0284c7; --bg: #f8fafc; --text: #0f172a; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 5px; display: flex; flex-direction: column; align-items: center; }
        
        .container { width: 100%; max-width: 600px; background: #fff; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        .session-info { font-size: 0.85rem; color: #64748b; background: #f1f5f9; padding: 12px; border-radius: 12px; margin-bottom: 10px; width: 100%; text-align: center; border: 1px solid #e2e8f0; font-weight: bold; display: none; box-sizing: border-box; }
        
        .registration-box { background: #f1f5f9; padding: 20px; border-radius: 18px; margin-bottom: 15px; border: 2.5px solid var(--primary); }
        .meta-input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-size: 1.1rem; }
        
        /* INCREASED IMAGE CONTAINER SIZE */
        .stimulus-box { width: 100%; height: 420px; background: #f8fafc; border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 15px; border: 2px solid #e2e8f0; overflow: hidden; }
        
        /* MAXIMIZED IMAGE DIMENSIONS */
        .stimulus-image { width: 95%; height: 80%; object-fit: contain; transition: transform 0.2s; }
        
        .target-word { font-size: 3.2rem; font-weight: 900; margin-top: 5px; color: var(--primary); letter-spacing: -1px; }
        .header-card { font-size: 3.5rem; font-weight: 900; color: #ef4444; text-align: center; line-height: 1.2; padding: 20px; }
        
        .btn-record { background: #ef4444; color: white; width: 100%; padding: 20px; border-radius: 18px; border: none; font-size: 1.3rem; font-weight: 800; cursor: pointer; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3); }
        .recording { background: #991b1b !important; animation: pulse 1.5s infinite; }
        
        .nav-row { display: flex; gap: 12px; width: 100%; margin-bottom: 15px; }
        .nav-btn { flex: 1; background: #f1f5f9; border: 2px solid #cbd5e1; padding: 15px; border-radius: 15px; font-weight: 800; font-size: 1rem; color: #475569; cursor: pointer; }
        
        .review-panel { background: #f0fdf4; border: 2px solid #10b981; padding: 20px; border-radius: 22px; display: none; margin-top: 15px; }
        .soda-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 15px 0; }
        .soda-btn { background: white; border: 1.5px solid #cbd5e1; padding: 14px; border-radius: 12px; font-size: 0.95rem; font-weight: 700; text-align: center; cursor: pointer; }
        .soda-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>

<div class="container">
    <div id="sessionDisplay" class="session-info"></div>

    <div style="text-align:center; font-size:0.9rem; font-weight:900; color:#94a3b8; margin-bottom:8px;" id="counter">ITEM 1 / 113</div>

    <div class="stimulus-box" id="mainDisplay">
        <div id="regForm" class="registration-box">
            <div style="font-size: 1rem; font-weight: 900; color: var(--primary); margin-bottom: 10px; text-align: center;">PATIENT REGISTRATION</div>
            <input type="text" id="pName" class="meta-input" placeholder="Patient Name (Mandatory)">
            <div style="display:flex; gap:10px;">
                <input type="text" id="pAge" class="meta-input" placeholder="Age (e.g. 6Y)">
                <select id="pGender" class="meta-input"><option value="M">Male</option><option value="F">Female</option></select>
            </div>
        </div>
        
        <img id="displayImg" src="" class="stimulus-image" style="display:none;">
        <div id="displayText" class="target-word"></div>
    </div>

    <div class="nav-row">
        <button class="nav-btn" onclick="changeItem(-1)">← PREV</button>
        <button class="nav-btn" onclick="changeItem(1)">NEXT →</button>
    </div>

    <button id="recordBtn" class="btn-record" style="display:none;" onclick="handleRecording()">🎙️ RECORD SAMPLE</button>

    <div id="reviewPanel" class="review-panel">
        <button class="soda-btn" style="width:100%; background:#0f172a; color:white; font-size: 1.1rem; padding: 18px;" onclick="playCurrent()">▶️ LISTEN TO SAMPLE</button>
        <div class="soda-grid">
            <div class="soda-btn" onclick="setLabel('Normal', this)">Normal</div>
            <div class="soda-btn" onclick="setLabel('Substitution', this)">Substitution</div>
            <div class="soda-btn" onclick="setLabel('Omission', this)">Omission</div>
            <div class="soda-btn" onclick="setLabel('Distortion', this)">Distortion</div>
            <div class="soda-btn" onclick="setLabel('Addition', this)">Addition</div>
        </div>
        <button class="btn-record" style="background:#10b981; margin:0; padding: 18px;" onclick="finalizeSave()">💾 SAVE & CONTINUE</button>
    </div>
</div>

    let currentIdx = 0, mediaRecorder, chunks = [], currentBlob = null, currentLabel = "NotLabeled";
    let audioCtx, streamSource, biquadFilter;

    function checkMetadata() {
        const name = document.getElementById('pName').value.trim();
        const age = document.getElementById('pAge').value.trim();
        const gender = document.getElementById('pGender').value;
        const display = document.getElementById('sessionDisplay');

        if (name !== "") {
            display.style.display = "block";
            display.textContent = `SESSION: ${name} | ${age || '?'}, ${gender}`;
            return true;
        }
        return false;
    }

    function changeItem(step) {
        if (step > 0 && currentIdx === 0 && !checkMetadata()) {
            alert("Mandatory: Please enter Patient Name to begin.");
            return;
        }
        currentIdx = (currentIdx + step + assessmentList.length) % assessmentList.length;
        updateUI();
    }

    function updateUI() {
        const item = assessmentList[currentIdx];
        const dImg = document.getElementById('displayImg');
        const dTxt = document.getElementById('displayText');
        const rBtn = document.getElementById('recordBtn');
        const reg = document.getElementById('regForm');
        
        if (currentIdx === 0) {
            reg.style.display = "block"; dImg.style.display = "none";
            dTxt.innerHTML = `<span class="header-card">${item.word}</span>`;
            rBtn.style.display = "none";
        } else if (item.type === "header") {
            reg.style.display = "none"; dImg.style.display = "none";
            dTxt.innerHTML = `<span class="header-card">${item.word}</span>`;
            rBtn.style.display = "none";
        } else {
            reg.style.display = "none"; dImg.style.display = "block"; 
            dImg.src = item.img; dTxt.textContent = item.word; 
            rBtn.style.display = "block";
        }
        
        document.getElementById('counter').textContent = `ITEM ${currentIdx + 1} / ${assessmentList.length}`;
        document.getElementById('reviewPanel').style.display = 'none';
        currentBlob = null; currentLabel = "NotLabeled";
    }

    async function handleRecording() {
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false, sampleRate: 48000 } 
                });

                streamSource = audioCtx.createMediaStreamSource(stream);
                biquadFilter = audioCtx.createBiquadFilter();
                biquadFilter.type = "highpass"; biquadFilter.frequency.value = 80;

                streamSource.connect(biquadFilter).connect(dest);
