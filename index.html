<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PGIMER Articulation - High Fidelity</title>
    <style>
        :root { --primary: #0284c7; --bg: #f8fafc; --text: #0f172a; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; background: #fff; padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); box-sizing: border-box; }
        .meta-section { background: #f1f5f9; padding: 12px; border-radius: 18px; margin-bottom: 15px; border: 1px solid #e2e8f0; font-size: 0.8rem; }
        .meta-input { width: 100%; padding: 8px; margin: 4px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        .stimulus-box { width: 100%; height: 260px; background: #f8fafc; border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 15px; border: 1px dashed #cbd5e1; position: relative; }
        .stimulus-image { max-width: 85%; max-height: 70%; object-fit: contain; }
        .target-word { font-size: 2.3rem; font-weight: 800; margin-top: 10px; color: var(--primary); }
        .header-card { font-size: 2.5rem; font-weight: 900; color: #ef4444; text-align: center; }
        .btn-record { background: #ef4444; color: white; width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: 700; margin-bottom: 10px; }
        .recording { background: #991b1b !important; animation: pulse 1.5s infinite; }
        .review-panel { background: #f0fdf4; border: 2px solid #10b981; padding: 15px; border-radius: 18px; display: none; }
        .soda-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 10px 0; }
        .soda-btn { background: white; border: 1px solid #cbd5e1; padding: 10px; border-radius: 8px; font-size: 0.8rem; text-align: center; cursor: pointer; }
        .soda-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>

<div class="container">
    <div class="meta-section">
        <input type="text" id="pName" class="meta-input" placeholder="Patient Name">
        <div style="display:flex; gap:10px;">
            <input type="text" id="pAge" class="meta-input" placeholder="Age">
            <select id="pGender" class="meta-input"><option value="M">Male</option><option value="F">Female</option></select>
        </div>
    </div>

    <div style="text-align:center; font-size:0.75rem; font-weight:bold; color:#64748b; margin-bottom:5px;" id="counter">ITEM 1 / 113</div>

    <div class="stimulus-box">
        <img id="displayImg" src="" class="stimulus-image">
        <div id="displayText" class="target-word"></div>
    </div>

    <div style="display:flex; gap:10px; width:100%; margin-bottom:15px;">
        <button class="soda-btn" style="flex:1" onclick="changeItem(-1)">PREV</button>
        <button class="soda-btn" style="flex:1" onclick="changeItem(1)">NEXT</button>
    </div>

    <button id="recordBtn" class="btn-record" onclick="handleRecording()">🎙️ RECORD HIGH-RES SAMPLE</button>

    <div id="reviewPanel" class="review-panel">
        <div style="font-size: 0.7rem; color: #065f46; font-weight: bold; margin-bottom: 5px;">HF-FILTERED SIGNAL READY</div>
        <button class="soda-btn" style="width:100%; background:#0f172a; color:white;" onclick="playCurrent()">▶️ PREVIEW CLEANED AUDIO</button>
        <div class="soda-grid">
            <div class="soda-btn" onclick="setLabel('Normal', this)">Normal</div>
            <div class="soda-btn" onclick="setLabel('Substitution', this)">Substitution</div>
            <div class="soda-btn" onclick="setLabel('Omission', this)">Omission</div>
            <div class="soda-btn" onclick="setLabel('Distortion', this)">Distortion</div>
            <div class="soda-btn" onclick="setLabel('Addition', this)">Addition</div>
        </div>
        <button class="btn-record" style="background:#10b981; margin:0;" onclick="finalizeSave()">💾 SAVE TO PHONE</button>
    </div>
</div>

<script>
    const assessmentList = [
        { type: "header", word: "VOWELS" },
        { word: "अनार", img: "page3.jpg" }, { word: "आम", img: "page4.jpg" },
        // ... include your full list here
        { type: "header", word: "CONSONANTS" },
        { word: "कमल", img: "page29.jpg" },
        // ... include middle items
        { type: "header", word: "BLENDS" },
        { word: "यज्ञ", img: "page112.jpg" }
    ];

    let currentIdx = 0, mediaRecorder, chunks = [], currentBlob = null, currentLabel = "NotLabeled";
    let audioCtx, streamSource, biquadFilter, recorderNode;

    async function handleRecording() {
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            try {
                // 1. RAW PARAMETERS: Disable system AGC and Noise Suppression
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { 
                        echoCancellation: false, 
                        noiseSuppression: false, 
                        autoGainControl: false,
                        sampleRate: 48000 
                    } 
                });

                // 2. WEB AUDIO API: Set High-Pass Filter at 80Hz
                // This removes low-frequency mechanical/wind noise while preserving speech
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
                streamSource = audioCtx.createMediaStreamSource(stream);
                biquadFilter = audioCtx.createBiquadFilter();
                biquadFilter.type = "highpass";
                biquadFilter.frequency.value = 80; 

                const dest = audioCtx.createMediaStreamDestination();
                streamSource.connect(biquadFilter);
                biquadFilter.connect(dest);

                mediaRecorder = new MediaRecorder(dest.stream);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => { currentBlob = new Blob(chunks, { type: 'audio/wav' }); document.getElementById('reviewPanel').style.display = 'block'; };

                mediaRecorder.start();
                document.getElementById('recordBtn').classList.add('recording');
                document.getElementById('recordBtn').textContent = "⏹️ STOP RECORDING";
                document.getElementById('reviewPanel').style.display = 'none';
            } catch (err) { alert("Hardware Error: " + err.message); }
        } else {
            mediaRecorder.stop();
            audioCtx.close();
            document.getElementById('recordBtn').classList.remove('recording');
            document.getElementById('recordBtn').textContent = "🎙️ RECORD HIGH-RES SAMPLE";
        }
    }

    // Navigation and UI logic
    function changeItem(step) { currentIdx = (currentIdx + step + assessmentList.length) % assessmentList.length; updateUI(); }
    function setLabel(l, b) { currentLabel = l; document.querySelectorAll('.soda-btn').forEach(x => x.classList.remove('selected')); b.classList.add('selected'); }
    function playCurrent() { if(currentBlob) new Audio(URL.createObjectURL(currentBlob)).play(); }

    function updateUI() {
        const item = assessmentList[currentIdx];
        const dImg = document.getElementById('displayImg');
        const dTxt = document.getElementById('displayText');
        const rBtn = document.getElementById('recordBtn');
        
        if (item.type === "header") {
            dImg.style.display = "none";
            dTxt.innerHTML = `<span class="header-card">${item.word}</span>`;
            rBtn.style.display = "none";
        } else {
            dImg.style.display = "block"; dImg.src = item.img;
            dTxt.textContent = item.word; rBtn.style.display = "block";
        }
        document.getElementById('counter').textContent = `ITEM ${currentIdx + 1} / ${assessmentList.length}`;
        document.getElementById('reviewPanel').style.display = 'none';
        currentBlob = null; currentLabel = "NotLabeled";
    }

    function finalizeSave() {
        const name = document.getElementById('pName').value.replace(/\s+/g, '_') || 'Patient';
        const date = new Date().toISOString().split('T')[0];
        const link = document.createElement('a');
        link.href = URL.createObjectURL(currentBlob);
        link.download = `${name}_${assessmentList[currentIdx].word}_${currentLabel}_${date}.wav`;
        link.click();
    }

    window.onload = updateUI;
</script>
</body>
</html>
