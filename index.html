<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PGIMER Articulation - Global ID Mode</title>
    <style>
        :root { --primary: #0284c7; --bg: #f8fafc; --text: #0f172a; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; background: #fff; padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        /* Persistent Metadata Header */
        .session-info { font-size: 0.75rem; color: #64748b; background: #f1f5f9; padding: 10px; border-radius: 12px; margin-bottom: 15px; width: 100%; text-align: center; border: 1px solid #e2e8f0; display: none; }
        
        /* Registration form - only on first page */
        .registration-box { background: #f1f5f9; padding: 15px; border-radius: 18px; margin-bottom: 20px; border: 2px solid var(--primary); }
        .meta-input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        .stimulus-box { width: 100%; height: 260px; background: #f8fafc; border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 15px; border: 1px dashed #cbd5e1; overflow: hidden; }
        .stimulus-image { max-width: 85%; max-height: 70%; object-fit: contain; }
        .target-word { font-size: 2.3rem; font-weight: 800; margin-top: 10px; color: var(--primary); }
        .header-card { font-size: 3rem; font-weight: 900; color: #ef4444; }
        
        .btn-record { background: #ef4444; color: white; width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: 700; cursor: pointer; }
        .recording { background: #991b1b !important; animation: pulse 1.5s infinite; }
        .review-panel { background: #f0fdf4; border: 2px solid #10b981; padding: 15px; border-radius: 18px; display: none; margin-top: 15px; }
        .soda-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 10px 0; }
        .soda-btn { background: white; border: 1px solid #cbd5e1; padding: 10px; border-radius: 8px; font-size: 0.85rem; text-align: center; cursor: pointer; }
        .soda-btn.selected { background: var(--primary); color: white; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>

<div class="container">
    <div id="sessionDisplay" class="session-info"></div>

    <div style="text-align:center; font-size:0.75rem; font-weight:bold; color:#64748b; margin-bottom:10px;" id="counter">ITEM 1 / 113</div>

    <div class="stimulus-box" id="mainDisplay">
        <div id="regForm" class="registration-box">
            <span style="font-size: 0.8rem; font-weight: 800; color: var(--primary);">NEW PATIENT REGISTRATION</span>
            <input type="text" id="pName" class="meta-input" placeholder="Patient Name (Mandatory)">
            <div style="display:flex; gap:10px;">
                <input type="text" id="pAge" class="meta-input" placeholder="Age">
                <select id="pGender" class="meta-input"><option value="M">Male</option><option value="F">Female</option></select>
            </div>
            <p style="font-size:0.65rem; color:#64748b; margin:5px 0 0 0;">*Details will apply to all 112 stimuli.</p>
        </div>
        
        <img id="displayImg" src="" class="stimulus-image" style="display:none;">
        <div id="displayText" class="target-word"></div>
    </div>

    <div style="display:flex; gap:10px; width:100%; margin-bottom:15px;">
        <button class="soda-btn" style="flex:1" onclick="changeItem(-1)">PREV</button>
        <button class="soda-btn" style="flex:1" onclick="changeItem(1)">NEXT</button>
    </div>

    <button id="recordBtn" class="btn-record" style="display:none;" onclick="handleRecording()">🎙️ RECORD SAMPLE</button>

    <div id="reviewPanel" class="review-panel">
        <button class="soda-btn" style="width:100%; background:#0f172a; color:white; margin-bottom:10px;" onclick="playCurrent()">▶️ PREVIEW</button>
        <div class="soda-grid">
            <div class="soda-btn" onclick="setLabel('Normal', this)">Normal</div>
            <div class="soda-btn" onclick="setLabel('Substitution', this)">Substitution</div>
            <div class="soda-btn" onclick="setLabel('Omission', this)">Omission</div>
            <div class="soda-btn" onclick="setLabel('Distortion', this)">Distortion</div>
            <div class="soda-btn" onclick="setLabel('Addition', this)">Addition</div>
        </div>
        <button class="btn-record" style="background:#10b981; margin:0;" onclick="finalizeSave()">💾 SAVE SAMPLE</button>
    </div>
</div>

<script>
    const assessmentList = [
        { type: "header", word: "VOWELS" },
        { word: "अनार", img: "page3.jpg" }, { word: "आम", img: "page4.jpg" },
        { word: "मटर", img: "page5.jpg" }, { word: "बस", img: "page6.jpg" },
        { word: "छाता", img: "page7.jpg" }, { word: "इमली", img: "page8.jpg" },
        { word: "बगीचा", img: "page9.jpg" }, { word: "तकिया", img: "page10.jpg" },
        { word: "जलेबी", img: "page11.jpg" }, { word: "तीन", img: "page12.jpg" },
        { word: "उल्लू", img: "page13.jpg" }, { word: "साबुन", img: "page14.jpg" },
        { word: "कबूतर", img: "page15.jpg" }, { word: "साधु", img: "page16.jpg" },
        { word: "भालू", img: "page17.jpg" }, { word: "ऊँट", img: "page18.jpg" },
        { word: "पेड़", img: "page19.jpg" }, { word: "ओखली", img: "page20.jpg" },
        { word: "गुब्बारे", img: "page21.jpg" }, { word: "समोसा", img: "page22.jpg" },
        { word: "ऐनक", img: "page23.jpg" }, { word: "कौआ", img: "page24.jpg" },
        { word: "अंगूर", img: "page25.jpg" }, { word: "खिलौना", img: "page26.jpg" },
        { word: "पतंग", img: "page27.jpg" },
        { type: "header", word: "CONSONANTS" },
        { word: "कमल", img: "page29.jpg" }, { word: "खरगोश", img: "page30.jpg" },
        { word: "बकरी", img: "page31.jpg" }, { word: "ओखली", img: "page32.jpg" },
        { word: "मेंढक", img: "page33.jpg" }, { word: "बत्तख", img: "page34.jpg" },
        { word: "गाजर", img: "page35.jpg" }, { word: "मगरमच्छ", img: "page36.jpg" },
        { word: "घाघरा", img: "page37.jpg" }, { word: "पतंग", img: "page38.jpg" },
        { word: "कंघा", img: "page39.jpg" }, { word: "चप्पल", img: "page40.jpg" },
        { word: "छाता", img: "page41.jpg" }, { word: "नाचना", img: "page42.jpg" },
        { word: "मछली", img: "page43.jpg" }, { word: "बच्चा", img: "page44.jpg" },
        { word: "मगरमच्छ", img: "page45.jpg" }, { word: "जहाज", img: "page46.jpg" },
        { word: "झंडा", img: "page47.jpg" }, { word: "गाजर", img: "page48.jpg" },
        { word: "टमाटर", img: "page49.jpg" }, { word: "बटन", img: "page50.jpg" },
        { word: "ऊँट", img: "page51.jpg" }, { word: "अंगूठी", img: "page52.jpg" },
        { word: "ठठेरा", img: "page53.jpg" }, { word: "डमरू", img: "page54.jpg" },
        { word: "मिठाई", img: "page55.jpg" }, { word: "झंडा", img: "page56.jpg" },
        { word: "ढोलक", img: "page57.jpg" }, { word: "बत्तख", img: "page58.jpg" },
        { word: "मेंढक", img: "page59.jpg" }, { word: "दांत", img: "page60.jpg" },
        { word: "तलवार", img: "page61.jpg" }, { word: "थरमस", img: "page62.jpg" },
        { word: "हथेली", img: "page63.jpg" }, { word: "मदारी", img: "page64.jpg" },
        { word: "हाथी", img: "page65.jpg" }, { word: "अमरुद", img: "page66.jpg" },
        { word: "धनुष", img: "page67.jpg" }, { word: "गधा", img: "page68.jpg" },
        { word: "कान", img: "page69.jpg" }, { word: "नल", img: "page70.jpg" },
        { word: "पपीता", img: "page71.jpg" }, { word: "ऐनक", img: "page72.jpg" },
        { word: "चप्पल", img: "page73.jpg" }, { word: "सांप", img: "page74.jpg" },
        { word: "सोफा", img: "page75.jpg" }, { word: "फूल", img: "page76.jpg" },
        { word: "बैंगन", img: "page77.jpg" }, { word: "ढफली", img: "page78.jpg" },
        { word: "कबूतर", img: "page79.jpg" }, { word: "जलेबी", img: "page80.jpg" },
        { word: "मछली", img: "page81.jpg" }, { word: "भालू", img: "page82.jpg" },
        { word: "टमाटर", img: "page83.jpg" }, { word: "खम्भा", img: "page84.jpg" },
        { word: "कलम", img: "page85.jpg" }, { word: "यज्ञ", img: "page86.jpg" },
        { word: "रेलगाड़ी", img: "page87.jpg" }, { word: "नारियल", img: "page88.jpg" },
        { word: "खरगोश", img: "page89.jpg" }, { word: "चाय", img: "page90.jpg" },
        { word: "मटर", img: "page91.jpg" }, { word: "लट्टू", img: "page92.jpg" },
        { word: "वानर", img: "page93.jpg" }, { word: "कलम", img: "page94.jpg" },
        { word: "तलवार", img: "page95.jpg" }, { word: "उल्लू", img: "page96.jpg" },
        { word: "नाव", img: "page97.jpg" }, { word: "सूरज", img: "page99.jpg" },
        { word: "मशीन", img: "page100.jpg" }, { word: "किसान", img: "page101.jpg" },
        { word: "समोसा", img: "page102.jpg" }, { word: "हाथी", img: "page103.jpg" },
        { word: "शहद", img: "page104.jpg" }, { word: "सिपाही", img: "page105.jpg" },
        { type: "header", word: "BLENDS" },
        { word: "क्षत्रिय", img: "page106.jpg" }, { word: "वृक्ष", img: "page107.jpg" },
        { word: "राक्षस", img: "page108.jpg" }, { word: "त्रिशूल", img: "page109.jpg" },
        { word: "क्षत्रिय", img: "page110.jpg" }, { word: "पत्र", img: "page111.jpg" },
        { word: "यज्ञ", img: "page112.jpg" }
    ];

    let currentIdx = 0, mediaRecorder, chunks = [], currentBlob = null, currentLabel = "NotLabeled";
    let audioCtx, streamSource, biquadFilter;

    // Logic for Mandatory Check and Auto-Filling
    function checkMetadata() {
        const name = document.getElementById('pName').value.trim();
        const age = document.getElementById('pAge').value.trim();
        const gender = document.getElementById('pGender').value;
        const display = document.getElementById('sessionDisplay');

        if (name !== "") {
            display.style.display = "block";
            display.textContent = `ACTIVE SESSION: ${name} (${age || 'N/A'}, ${gender})`;
            return true;
        }
        return false;
    }

    function changeItem(step) {
        // Only allow moving forward if name is filled
        if (step > 0 && currentIdx === 0 && !checkMetadata()) {
            alert("Mandatory: Please enter Patient Name to begin.");
            return;
        }
        currentIdx = (currentIdx + step + assessmentList.length) % assessmentList.length;
        updateUI();
    }

    function updateUI() {
        const item = assessmentList[currentIdx];
        const dImg = document.getElementById('displayImg');
        const dTxt = document.getElementById('displayText');
        const rBtn = document.getElementById('recordBtn');
        const reg = document.getElementById('regForm');
        
        if (currentIdx === 0) {
            reg.style.display = "block";
            dImg.style.display = "none";
            dTxt.innerHTML = `<span class="header-card">${item.word}</span>`;
            rBtn.style.display = "none";
        } else if (item.type === "header") {
            reg.style.display = "none";
            dImg.style.display = "none";
            dTxt.innerHTML = `<span class="header-card">${item.word}</span>`;
            rBtn.style.display = "none";
        } else {
            reg.style.display = "none";
            dImg.style.display = "block"; dImg.src = item.img;
            dTxt.textContent = item.word; rBtn.style.display = "block";
        }
        
        document.getElementById('counter').textContent = `ITEM ${currentIdx + 1} / ${assessmentList.length}`;
        document.getElementById('reviewPanel').style.display = 'none';
        currentBlob = null; currentLabel = "NotLabeled";
    }

    async function handleRecording() {
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false, sampleRate: 48000 } 
                });
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
                streamSource = audioCtx.createMediaStreamSource(stream);
                biquadFilter = audioCtx.createBiquadFilter();
                biquadFilter.type = "highpass";
                biquadFilter.frequency.value = 80; 

                const dest = audioCtx.createMediaStreamDestination();
                streamSource.connect(biquadFilter).connect(dest);

                mediaRecorder = new MediaRecorder(dest.stream);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => { currentBlob = new Blob(chunks, { type: 'audio/wav' }); document.getElementById('reviewPanel').style.display = 'block'; };

                mediaRecorder.start();
                document.getElementById('recordBtn').classList.add('recording');
                document.getElementById('recordBtn').textContent = "⏹️ STOP RECORDING";
                document.getElementById('reviewPanel').style.display = 'none';
            } catch (err) { alert("Mic Access Error: " + err.message); }
        } else {
            mediaRecorder.stop();
            audioCtx.close();
            document.getElementById('recordBtn').classList.remove('recording');
            document.getElementById('recordBtn').textContent = "🎙️ RECORD SAMPLE";
        }
    }

    function setLabel(l, b) { currentLabel = l; document.querySelectorAll('.soda-btn').forEach(x => x.classList.remove('selected')); b.classList.add('selected'); }
    function playCurrent() { if(currentBlob) new Audio(URL.createObjectURL(currentBlob)).play(); }

    function finalizeSave() {
        const name = document.getElementById('pName').value.replace(/\s+/g, '_');
        const age = document.getElementById('pAge').value || 'NA';
        const gender = document.getElementById('pGender').value;
        const date = new Date().toISOString().split('T')[0];
        
        const link = document.createElement('a');
        link.href = URL.createObjectURL(currentBlob);
        link.download = `${name}_${age}_${gender}_${assessmentList[currentIdx].word}_${currentLabel}_${date}.wav`;
        link.click();
    }

    window.onload = updateUI;
</script>
</body>
</html>
